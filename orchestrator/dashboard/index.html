<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>EVML fuzzing dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:   #cdbf9c;
    --card:    #e0d5ba;
    --ink:     #14120c;
    --ink-2:   #46412f;
    --faint:   #7c7459;
    --line:    #b6a988;
    --dot:     rgba(20,18,12,.10);
    --red:     #d63a2c;
    --green:   #1f9b54;
    --amber:   #cf8a1e;
    --blue:    #2f5ccc;
    --sh:      3px 3px 0 var(--ink);
    --sh-sm:   2px 2px 0 var(--ink);
    --display: "Dela Gothic One", "M PLUS Rounded 1c", system-ui, sans-serif;
    --body:    "M PLUS Rounded 1c", system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background-color: var(--paper);
    background-image: radial-gradient(var(--dot) 1.1px, transparent 1.1px);
    background-size: 22px 22px;
    color: var(--ink);
    font-family: var(--body);
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .num { font-variant-numeric: tabular-nums; }

  /* ---- masthead ---- */
  header {
    max-width: 1180px; margin: 0 auto;
    padding: 26px 22px 18px;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
  }
  .brand h1 {
    font-family: var(--display);
    font-size: clamp(38px, 7vw, 58px);
    line-height: .92; margin: 0; letter-spacing: -1px;
    color: var(--ink);
  }
  .brand h1 .tld { color: var(--red); }
  .brand .sub {
    margin-top: 8px; font-size: 13px; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase; color: var(--ink-2);
  }
  .stamp {
    flex: none; text-align: right; font-size: 12px; font-weight: 700;
    color: var(--ink-2); white-space: nowrap;
  }
  .stamp #updated { display: inline-block; padding: 4px 10px; border: 2px solid var(--ink); border-radius: 999px; background: var(--card); box-shadow: var(--sh-sm); }

  main { max-width: 1180px; margin: 0 auto; padding: 0 22px 8px; }

  /* ---- switch bank ---- */
  .bank {
    display: flex; align-items: stretch; gap: 0;
    border: 2px solid var(--ink); border-radius: 12px; box-shadow: var(--sh);
    background: var(--card); margin-bottom: 24px; overflow: hidden;
  }
  .bank .tab {
    writing-mode: vertical-rl; transform: rotate(180deg);
    font-family: var(--display); font-size: 12px; letter-spacing: .12em;
    background: var(--ink); color: var(--paper);
    display: flex; align-items: center; justify-content: center; padding: 0 6px;
  }
  .switches { display: flex; flex: 1; flex-wrap: wrap; }
  .switch {
    flex: 1; min-width: 120px;
    display: flex; flex-direction: column; align-items: center; gap: 9px;
    padding: 16px 10px; border-right: 2px dotted var(--line);
  }
  .switch:last-child { border-right: none; }
  .sw {
    position: relative; width: 38px; height: 62px;
    border: 2px solid var(--ink); border-radius: 9px;
    background: var(--paper);
    box-shadow: inset 0 0 0 3px var(--card);
  }
  .sw .knob {
    position: absolute; left: 4px; right: 4px; height: 25px;
    border: 2px solid var(--ink); border-radius: 6px;
    background: var(--faint);
    transition: top .2s cubic-bezier(.5,1.7,.5,1), background .2s;
  }
  .sw.up   .knob { top: 4px;  background: var(--green); }
  .sw.down .knob { top: 27px; background: var(--ink-2); }
  .sw::after {
    content: ""; position: absolute; left: 50%; width: 12px; height: 2px;
    background: var(--line); transform: translateX(-50%);
    top: 50%; margin-top: -1px;
  }
  .sw-name { font-family: var(--display); font-size: 14px; color: var(--ink); }
  .sw-state { font-size: 12px; font-weight: 700; }
  .sw-state.on  { color: var(--green); }
  .sw-state.off { color: var(--red); }

  /* ---- stat cards ---- */
  .cards { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 24px; }
  .card {
    background: var(--card); border: 2px solid var(--ink); border-radius: 11px;
    box-shadow: var(--sh); padding: 13px 15px;
  }
  .card .label { font-size: 12px; font-weight: 800; color: var(--ink-2); }
  .card .value { font-family: var(--display); font-size: 30px; line-height: 1; margin-top: 9px; color: var(--ink); }
  .card .value small { font-family: var(--body); font-size: 13px; font-weight: 700; color: var(--faint); }
  .card.flag { background: var(--red); border-color: var(--ink); }
  .card.flag .label, .card.flag .value { color: #fff; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 860px) { .cards { grid-template-columns: repeat(2,1fr); } .grid2 { grid-template-columns: 1fr; } }

  /* ---- phones (Android / narrow) ---- */
  @media (max-width: 600px) {
    header { flex-direction: column; align-items: flex-start; gap: 10px; padding: 18px 14px 12px; }
    .stamp { text-align: left; white-space: normal; }
    main { padding: 0 14px 8px; }
    footer { padding: 10px 14px 28px; }

    /* keep two stat cards across; shrink the big number so it can't overflow */
    .cards { gap: 10px; }
    .card { padding: 11px 12px; }
    .card .value { font-size: 22px; overflow-wrap: anywhere; }

    /* let all status switches fit one row by shrinking instead of wrapping */
    .switch { min-width: 0; padding: 14px 6px; gap: 7px; }

    /* stack key/value rows so the fixed label column stops eating the screen */
    .kv { grid-template-columns: 1fr; gap: 2px 0; }
    .kv dt { margin-top: 8px; }
    .kv dt:first-of-type { margin-top: 0; }

    /* wide tables scroll sideways inside their card, not the whole page */
    .scroll, .panel .body { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    th, td { white-space: nowrap; padding: 8px 12px; }
    .obj { max-width: 180px; }
  }

  /* ---- panels ---- */
  section.panel {
    background: var(--card); border: 2px solid var(--ink); border-radius: 11px;
    box-shadow: var(--sh); margin-bottom: 24px; overflow: hidden;
  }
  .panel h2 {
    font-family: var(--display); font-size: 15px; font-weight: 400;
    color: var(--paper); background: var(--ink);
    margin: 0; padding: 9px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .panel .body { padding: 16px; }

  .ph-actions { margin-left: auto; display: inline-flex; align-items: center; gap: 10px; }
  .ph-msg { font-family: var(--body); font-size: 12px; font-weight: 700; color: var(--card); }
  .btn {
    font-family: var(--body); font-weight: 800; font-size: 12px;
    color: var(--ink); background: var(--paper);
    border: 2px solid var(--paper); border-radius: 7px;
    padding: 4px 12px; cursor: pointer;
  }
  .btn:hover { background: var(--card); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .55; cursor: default; }
  .btn-stop { background: var(--red); border-color: var(--red); color: #fff; }
  .btn-stop:hover { background: #b8281b; }

  .kv { display: grid; grid-template-columns: 140px 1fr; gap: 9px 14px; }
  .kv dt { color: var(--ink-2); font-weight: 800; }
  .kv dd { margin: 0; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 16px; }
  th { color: var(--ink-2); font-weight: 800; font-size: 12px; border-bottom: 2px solid var(--ink); background: var(--card); }
  td { border-bottom: 1px solid var(--line); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--paper); }
  td.r, th.r { text-align: right; }
  .tag {
    display: inline-block; padding: 1px 9px; margin-right: 4px;
    border: 1.5px solid var(--ink); border-radius: 999px;
    font-size: 12px; font-weight: 700; color: var(--ink); background: var(--paper);
  }
  .obj { max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .zero { color: var(--faint); }
  .hit { color: var(--red); font-weight: 800; }
  .rc-bad { color: var(--amber); font-weight: 800; }
  .mono { font-family: ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace; font-size: 12.5px; }

  .scroll { max-height: 460px; overflow-y: auto; }
  .scroll thead th { position: sticky; top: 0; }
  .scroll::-webkit-scrollbar { width: 12px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--ink); border-radius: 999px; border: 3px solid var(--card); }
  .scroll::-webkit-scrollbar-track { background: transparent; }

  .empty { color: var(--ink-2); padding: 16px; font-weight: 600; }

  .bar { height: 14px; border: 2px solid var(--ink); border-radius: 999px; background: var(--paper); overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--blue); transition: width .4s ease; }
  .bar.done > i { background: var(--green); }
  .bar.stopped > i { background: var(--amber); }

  footer {
    max-width: 1180px; margin: 0 auto; padding: 10px 22px 30px;
    color: var(--ink-2); font-size: 12px; font-weight: 600;
  }
  footer .mono { color: var(--ink); }

  /* when the page can't reach /api/stats, dim everything and make the stamp
     shout — so a frozen page can't masquerade as a live one */
  body.stale main { opacity: .38; filter: grayscale(.5); pointer-events: none; transition: opacity .25s; }
  body.stale #updated { background: var(--red); color: #fff; border-color: var(--ink); }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>EVML<span class="tld">.</span></h1>
    <div class="sub">llm-guided evm differential fuzzer</div>
  </div>
  <div class="stamp"><span id="updated">updating</span></div>
</header>

<main>
  <div class="bank">
    <div class="tab">STATUS</div>
    <div class="switches">
      <div class="switch">
        <div class="sw down" id="loop-sw"><i class="knob"></i></div>
        <div class="sw-name">loop</div>
        <div class="sw-state" id="loop-text">…</div>
      </div>
      <div class="switch">
        <div class="sw down" id="llama-sw"><i class="knob"></i></div>
        <div class="sw-name">llama</div>
        <div class="sw-state" id="llama-text">…</div>
      </div>
      <div class="switch" id="posthoc-switch" style="display:none">
        <div class="sw down" id="posthoc-sw"><i class="knob"></i></div>
        <div class="sw-name">post-hoc</div>
        <div class="sw-state" id="posthoc-text">…</div>
      </div>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <section class="panel" id="posthoc-panel">
    <h2>post-hoc differential sweep
      <span class="ph-actions">
        <span class="ph-msg" id="ph-msg"></span>
        <button class="btn" id="ph-run" onclick="startPosthoc()">run sweep</button>
        <button class="btn btn-stop" id="ph-stop" onclick="stopPosthoc()" style="display:none">stop</button>
      </span>
    </h2>
    <div class="body" id="posthoc-body"></div>
  </section>

  <div class="grid2">
    <section class="panel">
      <h2>current run</h2>
      <div class="body">
        <dl class="kv" id="runkv"></dl>
      </div>
    </section>
    <section class="panel">
      <h2>divergences</h2>
      <div class="body" id="divbox"></div>
    </section>
  </div>

  <section class="panel">
    <h2>recent batches</h2>
    <div class="scroll" id="batches"></div>
  </section>
</main>

<footer>
  polls <span class="mono">/api/stats</span> every 5s. reads <span class="mono">out/llm_guided/</span> reports and session state.
  &nbsp;·&nbsp; theme: kraft / <a href="/blueprint" style="color:var(--blue)">blueprint</a>
</footer>

<script>
const fmt = n => (n ?? 0).toLocaleString("en-US");
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function ago(iso) {
  if (!iso) return "·";
  const t = new Date(iso).getTime();
  if (isNaN(t)) return iso;
  const s = Math.floor((Date.now() - t) / 1000);
  if (s < 0) return "in " + rel(-s);
  return rel(s) + " ago";
}
function rel(s) {
  if (s < 60) return s + "s";
  if (s < 3600) return Math.floor(s/60) + "m";
  if (s < 86400) return Math.floor(s/3600) + "h " + Math.floor((s%3600)/60) + "m";
  return Math.floor(s/86400) + "d";
}

// Flip the physical switch: knob up = on, down = off. The state line below
// carries the words.
function setStatus(id, on, text) {
  const sw = document.getElementById(id + "-sw");
  if (sw) sw.className = "sw " + (on ? "up" : "down");
  const el = document.getElementById(id + "-text");
  if (el) { el.textContent = text; el.className = "sw-state " + (on ? "on" : "off"); }
}

function card(label, value, sub, flag) {
  return `<div class="card${flag ? " flag" : ""}">
    <div class="label">${label}</div>
    <div class="value num">${value}${sub ? ` <small>${sub}</small>` : ""}</div>
  </div>`;
}

function render(d) {
  document.getElementById("updated").textContent = "updated " + ago(d.generated_at);

  const b = d.loop.current_batch;
  setStatus("loop", d.loop.running,
    d.loop.running ? (b ? "running b" + b : "running") : "stopped");
  setStatus("llama", d.llama.running, d.llama.running ? "up" : "down");

  const t = d.totals, r = d.rates;
  document.getElementById("cards").innerHTML =
    card("state tests", fmt(t.tests)) +
    card("divergences", fmt(t.divergences), null, t.divergences > 0) +
    card("batches", fmt(t.batches)) +
    card("plans", fmt(t.plans)) +
    card("crashers", fmt(t.crashers)) +
    card("div / 1M", (r.divergences_per_million_tests ?? 0).toFixed(2));

  const L = d.loop;
  document.getElementById("runkv").innerHTML = `
    <dt>objective</dt><dd>${esc(L.current_objective) || "·"}</dd>
    <dt>clients</dt><dd>${(d.clients||[]).map(v=>`<span class="tag">${esc(v)}</span>`).join("") || "·"}</dd>
    <dt>current batch</dt><dd class="num">${L.current_batch ?? "·"}</dd>
    <dt>started</dt><dd>${L.started ? esc(L.started) + ` <span class="zero">(${ago(L.started)})</span>` : "·"}</dd>
    <dt>scheduled stop</dt><dd>${L.stop_at ? esc(L.stop_at) + ` <span class="zero">(${ago(L.stop_at)})</span>` : "no cap"}</dd>
    <dt>avg tests/batch</dt><dd class="num">${fmt(r.tests_per_batch)}</dd>`;

  const ph = d.posthoc;
  const phSwitch = document.getElementById("posthoc-switch");
  const phRunning = !!(ph && ph.running);
  const phBtn = document.getElementById("ph-run");
  if (phBtn) {
    phBtn.disabled = phRunning;
    phBtn.textContent = phRunning ? "running…" : "run sweep";
  }
  const phStop = document.getElementById("ph-stop");
  if (phStop) phStop.style.display = phRunning ? "" : "none";
  if (!ph) {
    phSwitch.style.display = "none";
    document.getElementById("posthoc-body").innerHTML =
      `<div class="empty">no sweep has run yet. press “run sweep” to diff the corpus across clients.</div>`;
  } else {
    phSwitch.style.display = "";
    const pct = ph.total ? Math.floor(ph.done * 100 / ph.total) : 0;
    const state = ph.finished ? "done" : (ph.running ? "running" : "stopped");
    setStatus("posthoc", ph.finished || ph.running,
      ph.finished ? "done" : (ph.running ? pct + "%" : "stopped"));
    document.getElementById("posthoc-body").innerHTML = `
      <div class="bar ${state}"><i style="width:${ph.finished ? 100 : pct}%"></i></div>
      <dl class="kv" style="margin-top:16px">
        <dt>progress</dt><dd class="num">${fmt(ph.done)} / ${fmt(ph.total)} dirs (${pct}%)${ph.skipped ? ` <span class="zero">(${fmt(ph.skipped)} already done)</span>` : ""}</dd>
        <dt>state</dt><dd>${ph.finished ? "done" : (ph.running ? "running" : `<span class="rc-bad">stopped (not finished)</span>`)}</dd>
        <dt>divergences</dt><dd class="num ${ph.divergences ? "hit" : "zero"}">${fmt(ph.divergences)}</dd>
        ${ph.nonok ? `<dt>non-ok dirs</dt><dd class="num rc-bad">${fmt(ph.nonok)}</dd>` : ""}
        <dt>started</dt><dd>${ph.started ? esc(ph.started) + ` <span class="zero">(${ago(ph.started)})</span>` : "·"}</dd>
        <dt>eta</dt><dd>${(ph.running && !ph.finished && ph.eta_s) ? "~" + rel(ph.eta_s) + " remaining" : "·"}</dd>
        <dt>latest dir</dt><dd class="mono">${esc(ph.last_plan) || "·"}</dd>
      </dl>`;
  }

  const dv = d.recent_divergences || [];
  const divbox = document.getElementById("divbox");
  if (!dv.length) {
    divbox.innerHTML = `<div class="empty">no divergences recorded. all clients agree across ${fmt(t.tests)} state tests.</div>`;
  } else {
    divbox.innerHTML = `<table><thead><tr><th>test</th><th>vm</th><th>ref</th><th>batch</th><th class="r">when</th></tr></thead><tbody>` +
      dv.map(x => `<tr>
        <td class="mono">${esc(x.file)}</td>
        <td class="hit">${esc(x.vm)}</td>
        <td>${esc(x.ref_vm)}</td>
        <td class="mono">${esc(x.plan_id)}</td>
        <td class="r">${ago(new Date(x.mtime*1000).toISOString())}</td>
      </tr>`).join("") + `</tbody></table>`;
  }

  const rows = d.recent_batches || [];
  const batches = document.getElementById("batches");
  if (!rows.length) {
    batches.innerHTML = `<div class="empty">no diff reports yet.</div>`;
  } else {
    batches.innerHTML = `<table><thead><tr>
        <th>when</th><th>objective</th><th class="r">tests</th><th class="r">divs</th>
        <th class="r">diff (s)</th><th>clients</th><th class="r">rc</th>
      </tr></thead><tbody>` +
      rows.map(x => `<tr>
        <td>${ago(new Date(x.mtime*1000).toISOString())}</td>
        <td class="obj" title="${esc(x.objective)}">${esc(x.objective)}</td>
        <td class="r num">${fmt(x.tests)}</td>
        <td class="r num ${x.divergences ? "hit" : "zero"}">${x.divergences}</td>
        <td class="r num">${x.duration_s}</td>
        <td>${(x.vms||[]).map(v=>`<span class="tag">${esc(v)}</span>`).join("")}</td>
        <td class="r num ${x.rc ? "rc-bad" : "zero"}">${x.rc}</td>
      </tr>`).join("") + `</tbody></table>`;
  }
}

async function startPosthoc() {
  const btn = document.getElementById("ph-run");
  const msg = document.getElementById("ph-msg");
  btn.disabled = true; btn.textContent = "starting…";
  if (msg) msg.textContent = "";
  try {
    const res = await fetch("/api/posthoc/start", { method: "POST" });
    const j = await res.json().catch(() => ({}));
    if (res.ok && j.ok)        { if (msg) msg.textContent = "sweep started"; }
    else if (res.status === 409) { if (msg) msg.textContent = "already running"; }
    else                       { if (msg) msg.textContent = "error: " + (j.error || res.status); }
  } catch (e) {
    if (msg) msg.textContent = "request failed";
  }
  // let the next poll settle button + progress state
  setTimeout(tick, 700);
}

async function stopPosthoc() {
  const btn = document.getElementById("ph-stop");
  const msg = document.getElementById("ph-msg");
  if (btn) { btn.disabled = true; btn.textContent = "stopping…"; }
  if (msg) msg.textContent = "";
  try {
    const res = await fetch("/api/posthoc/stop", { method: "POST" });
    const j = await res.json().catch(() => ({}));
    if (res.ok && j.ok) { if (msg) msg.textContent = "stopped" + (j.killed ? ` (${j.killed} procs)` : " (nothing running)"); }
    else                { if (msg) msg.textContent = "error: " + (j.error || res.status); }
  } catch (e) {
    if (msg) msg.textContent = "request failed";
  }
  if (btn) { btn.disabled = false; btn.textContent = "stop"; }
  setTimeout(tick, 700);
}

let lastOk = 0;

// A failed/stalled poll must not leave the last render looking live. After ~15s
// without fresh data, dim the page and turn the stamp into a stale warning.
function markStale() {
  const stale = !lastOk || (Date.now() - lastOk > 15000);
  document.body.classList.toggle("stale", stale);
  if (stale && lastOk) {
    document.getElementById("updated").textContent =
      "stale — no data for " + rel(Math.floor((Date.now() - lastOk) / 1000));
  }
}

async function tick() {
  try {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 4000);
    const res = await fetch("/api/stats", { cache: "no-store", signal: ctrl.signal });
    clearTimeout(to);
    if (!res.ok) throw new Error("http " + res.status);
    render(await res.json());
    lastOk = Date.now();
    document.body.classList.remove("stale");
  } catch (e) {
    document.getElementById("updated").textContent = "fetch failed, retrying";
    markStale();
  }
}
tick();
setInterval(tick, 5000);
setInterval(markStale, 3000);
</script>
</body>
</html>
